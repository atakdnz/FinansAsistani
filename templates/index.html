<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kişisel Finans Öneri Asistanı</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f1e;--card:#111827;--card2:#1a2235;
  --border:#1e2d45;--text:#e2e8f0;--muted:#64748b;
  --cyan:#22d3ee;--purple:#a78bfa;--orange:#fb923c;
  --green:#4ade80;--red:#f87171;--yellow:#fbbf24;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.hero{background:linear-gradient(135deg,#0a0f1e 0%,#0f172a 50%,#1a1040 100%);
  padding:48px 24px 32px;text-align:center;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(99,102,241,.15),transparent)}
.hero h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;
  background:linear-gradient(90deg,var(--cyan),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.hero p{color:var(--muted);font-size:.95rem}
.badge{display:inline-block;padding:4px 14px;border-radius:999px;font-size:.75rem;font-weight:600;margin-top:12px}
.badge-cyan{background:rgba(34,211,238,.12);color:var(--cyan);border:1px solid rgba(34,211,238,.3)}

.container{max-width:1280px;margin:0 auto;padding:32px 20px}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-bottom:24px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:24px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
.card-title{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:14px;border-radius:2px;background:var(--cyan)}

/* Stat cards */
.stat-val{font-size:1.8rem;font-weight:800;margin-bottom:4px}
.stat-sub{font-size:.8rem;color:var(--muted)}
.cyan{color:var(--cyan)}.purple{color:var(--purple)}.orange{color:var(--orange)}
.green{color:var(--green)}.yellow{color:var(--yellow)}

/* Profile card */
.profile-card{background:linear-gradient(135deg,var(--card),var(--card2));
  border:2px solid var(--cyan);border-radius:20px;padding:32px;text-align:center;
  position:relative;overflow:hidden;margin-bottom:24px}
.profile-card::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(34,211,238,.08),transparent)}
.profile-name{font-size:2.4rem;font-weight:800;margin:8px 0}
.profile-desc{color:var(--muted);font-size:.9rem;max-width:400px;margin:0 auto}
.defuzz-bar{height:12px;background:var(--border);border-radius:6px;margin:20px 0 8px;position:relative}
.defuzz-fill{height:100%;border-radius:6px;
  background:linear-gradient(90deg,var(--cyan),var(--purple),var(--orange));transition:width 1.2s ease}
.defuzz-marker{position:absolute;top:-4px;width:20px;height:20px;background:#fff;
  border-radius:50%;border:3px solid var(--cyan);transform:translateX(-50%);
  box-shadow:0 0 12px rgba(34,211,238,.5);transition:left 1.2s ease}
.defuzz-labels{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted)}

/* Üyelik dereceleri */
.deg-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.deg-label{width:90px;font-size:.8rem;color:var(--muted)}
.deg-bar-wrap{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.deg-bar{height:100%;border-radius:4px;transition:width 1s ease}
.deg-val{width:44px;text-align:right;font-size:.8rem;font-weight:600}

/* Kurallar */
.rule-item{display:flex;align-items:center;gap:12px;padding:10px 14px;
  border-radius:10px;margin-bottom:8px;border:1px solid var(--border);
  transition:all .2s}
.rule-item.active{border-color:rgba(34,211,238,.4);background:rgba(34,211,238,.05)}
.rule-id{font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:6px;
  background:var(--card2);color:var(--cyan);min-width:30px;text-align:center}
.rule-cond{flex:1;font-size:.8rem;color:var(--text)}
.rule-conc{font-size:.75rem;padding:3px 10px;border-radius:999px;font-weight:600}
.conc-g{background:rgba(34,211,238,.15);color:var(--cyan)}
.conc-d{background:rgba(167,139,250,.15);color:var(--purple)}
.conc-a{background:rgba(251,146,60,.15);color:var(--orange)}
.rule-act{font-size:.8rem;font-weight:700;min-width:44px;text-align:right}

/* Portföy */
.porto-item{display:flex;align-items:center;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--border)}
.porto-item:last-child{border-bottom:none}
.porto-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.porto-name{flex:1;font-size:.85rem}
.porto-pct{font-weight:700;font-size:.9rem}
.porto-bar-wrap{width:100px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.porto-bar-fill{height:100%;border-radius:3px;transition:width 1s ease}

/* Kategori */
.kat-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.kat-item:last-child{border-bottom:none}
.kat-name{flex:1;font-size:.82rem}
.kat-amt{font-weight:600;font-size:.85rem;white-space:nowrap}

canvas{max-width:100%}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:300px;gap:16px;color:var(--muted)}
.spinner{width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.section-title{font-size:1rem;font-weight:700;margin:32px 0 16px;
  display:flex;align-items:center;gap:10px;color:var(--text)}
.section-title span{font-size:1.2rem}
</style>
</head>
<body>

<div class="hero">
  <div class="badge badge-cyan">🧠 Mamdani Bulanık Mantık · Centroid Durulaştırma</div>
  <h1>Kişisel Finans Öneri Asistanı</h1>
  <p>CSV verilerinden otomatik yatırım profili analizi</p>
</div>

<div class="container" id="app">
  <div class="loading"><div class="spinner"></div><p>Veriler hesaplanıyor...</p></div>
</div>

<script>
const COLORS = ['#22d3ee','#a78bfa','#4ade80','#fb923c','#fbbf24','#f87171','#818cf8'];

async function loadData(){
  const res = await fetch('/api/data');
  return res.json();
}

function degColor(v){
  if(v>=.66) return '#22d3ee';
  if(v>=.33) return '#a78bfa';
  return '#64748b';
}

function profileColor(p){
  return p==='Güvenilir'?'var(--cyan)':p==='Dengeli'?'var(--purple)':'var(--orange)';
}

function renderMFChart(canvasId, data, val){
  const ctx = document.getElementById(canvasId).getContext('2d');
  const colors = ['#22d3ee','#a78bfa','#fb923c'];
  const labels = Object.keys(data.curves);
  const datasets = labels.map((lbl,i)=>({
    label: lbl,
    data: data.curves[lbl],
    borderColor: colors[i], borderWidth: 2.5,
    showLine: true,
    fill: true, backgroundColor: colors[i].replace(')',',0.06)').replace('rgb','rgba'),
    pointRadius: 0, tension: 0
  }));
  // Dikey çizgi (crisp input)
  datasets.push({
    label: 'Girdi',
    data: [{x:val,y:0},{x:val,y:1}],
    borderColor:'#fff', borderWidth:2,
    borderDash:[5,4], showLine: true,
    pointRadius:0, fill:false
  });
  new Chart(ctx,{type:'scatter',data:{datasets},
    options:{responsive:true,animation:{duration:800},
      plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:11},boxWidth:12}}},
      scales:{
        x:{min:0,max:1,grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#64748b',font:{size:10}}},
        y:{min:0,max:1,grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#64748b',font:{size:10}}}
      }
    }
  });
}

function renderOutputChart(canvasId, outData){
  const ctx = document.getElementById(canvasId).getContext('2d');
  const colors = ['#22d3ee','#a78bfa','#fb923c'];
  const labels = Object.keys(outData.curves);
  const datasets = labels.map((lbl,i)=>({
    label: lbl, data: outData.curves[lbl],
    borderColor: colors[i], borderWidth: 2,
    showLine: true,
    fill: false, pointRadius: 0, tension: 0
  }));
  datasets.push({
    label:'Agregasyon', data: outData.aggregation,
    borderColor:'#4ade80', borderWidth:2.5,
    showLine: true,
    fill:true, backgroundColor:'rgba(74,222,128,.1)',
    pointRadius:0, tension:0
  });
  datasets.push({
    label:'Centroid',
    data:[{x:outData.defuzz,y:0},{x:outData.defuzz,y:1}],
    borderColor:'#fff', borderWidth:2,
    borderDash:[5,4], showLine: true,
    pointRadius:0, fill:false
  });
  new Chart(ctx,{type:'scatter',data:{datasets},
    options:{responsive:true,animation:{duration:800},
      plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:11},boxWidth:12}}},
      scales:{
        x:{min:0,max:1,grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#64748b',font:{size:10}}},
        y:{min:0,max:1,grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#64748b',font:{size:10}}}
      }
    }
  });
}

function renderMonthly(canvasId, monthly){
  const ctx = document.getElementById(canvasId).getContext('2d');
  new Chart(ctx,{type:'bar',
    data:{labels:monthly.labels,datasets:[
      {label:'Gelir',data:monthly.gelir,backgroundColor:'rgba(34,211,238,.7)',borderRadius:6},
      {label:'Gider',data:monthly.gider,backgroundColor:'rgba(248,113,113,.7)',borderRadius:6},
      {label:'Tasarruf',data:monthly.tasarruf,type:'line',
       borderColor:'#4ade80',backgroundColor:'rgba(74,222,128,.1)',
       borderWidth:2.5,pointRadius:4,fill:true,tension:.3}
    ]},
    options:{responsive:true,animation:{duration:800},
      plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:11},boxWidth:12}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#64748b',font:{size:10}}},
        y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#64748b',font:{size:10},
          callback:v=>v>=1000?(v/1000).toFixed(0)+'K TL':v}}
      }
    }
  });
}

function renderKatPie(canvasId, kategoriler){
  const ctx = document.getElementById(canvasId).getContext('2d');
  const labels = Object.keys(kategoriler);
  const vals   = Object.values(kategoriler);
  new Chart(ctx,{type:'doughnut',
    data:{labels,datasets:[{data:vals,backgroundColor:COLORS,borderWidth:2,borderColor:'#111827'}]},
    options:{responsive:true,cutout:'68%',
      plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:11},boxWidth:12}}}}
  });
}

function renderPortoPie(canvasId, items){
  const ctx = document.getElementById(canvasId).getContext('2d');
  new Chart(ctx,{type:'doughnut',
    data:{labels:Object.keys(items),datasets:[{
      data:Object.values(items),backgroundColor:COLORS,borderWidth:2,borderColor:'#111827'}]},
    options:{responsive:true,cutout:'68%',
      plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:11},boxWidth:12}}}}
  });
}

function fmt(n){return new Intl.NumberFormat('tr-TR',{maximumFractionDigits:0}).format(n)}

function render(d){
  const pc = profileColor(d.profil);
  const pct = Math.round(d.defuzz*100);
  const cls = d.banka.siniflandirma || {toplam:0,dusuk_guven_adedi:0,yontemler:{},dusuk_guven_ornekleri:[]};

  const mfKeys = [
    ['gelir_duzenliligi','Gelir Düzenliliği','mf1'],
    ['esneklik_orani','Esneklik Oranı','mf2'],
    ['risk_toleransi','Risk Toleransı','mf3']
  ];

  const concClass = {'Güvenilir':'conc-g','Dengeli':'conc-d','Agresif':'conc-a'};

  const porto = d.portfolyo;
  const portoItems = Object.entries(porto.items);

  document.getElementById('app').innerHTML = `

  <!-- Profil -->
  <div class="profile-card" style="border-color:${pc}">
    <div style="font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">Önerilen Yatırım Profili</div>
    <div class="profile-name" style="color:${pc}">${d.profil.toUpperCase()}</div>
    <div class="profile-desc">${porto.desc}</div>
    <div class="defuzz-bar" style="margin-top:24px">
      <div class="defuzz-fill" style="width:${pct}%"></div>
      <div class="defuzz-marker" style="left:${pct}%"></div>
    </div>
    <div class="defuzz-labels">
      <span style="color:var(--cyan)">Güvenilir</span>
      <span style="color:var(--purple)">Dengeli</span>
      <span style="color:var(--orange)">Agresif</span>
    </div>
    <div style="margin-top:8px;font-size:.85rem;color:var(--muted)">
      Centroid çıktısı: <strong style="color:${pc}">${d.defuzz.toFixed(4)}</strong>
    </div>
  </div>

  <!-- Üst istatistikler -->
  <div class="grid4">
    <div class="card"><div class="card-title">Toplam Gelir</div>
      <div class="stat-val cyan">${fmt(d.banka.toplam_gelir)}<span style="font-size:.9rem"> TL</span></div>
      <div class="stat-sub">12 aylık toplam</div></div>
    <div class="card"><div class="card-title">Toplam Gider</div>
      <div class="stat-val" style="color:var(--red)">${fmt(d.banka.toplam_gider)}<span style="font-size:.9rem"> TL</span></div>
      <div class="stat-sub">12 aylık toplam</div></div>
    <div class="card"><div class="card-title">Aylık Ort. Tasarruf</div>
      <div class="stat-val green">${fmt(d.banka.aylik_tasarruf_ort)}<span style="font-size:.9rem"> TL</span></div>
      <div class="stat-sub">Net birikim</div></div>
    <div class="card"><div class="card-title">Tasarruf Potansiyeli</div>
      <div class="stat-val yellow">${fmt(d.banka.istege_bagli)}<span style="font-size:.9rem"> TL</span></div>
      <div class="stat-sub">Kısılabilir + isteğe bağlı gider / yıl</div></div>
  </div>

  <!-- Sınıflandırma -->
  <div class="section-title"><span>🏷️</span> İşlem Sınıflandırma Özeti</div>
  <div class="grid3">
    <div class="card"><div class="card-title">Toplam İşlem</div>
      <div class="stat-val cyan">${fmt(cls.toplam)}</div>
      <div class="stat-sub">Açıklama + tutar üzerinden sınıflandırıldı</div></div>
    <div class="card"><div class="card-title">Düşük Güven</div>
      <div class="stat-val ${cls.dusuk_guven_adedi ? 'yellow' : 'green'}">${fmt(cls.dusuk_guven_adedi)}</div>
      <div class="stat-sub">Gözden geçirilecek belirsiz kayıt</div></div>
    <div class="card"><div class="card-title">Yöntem Dağılımı</div>
      ${Object.entries(cls.yontemler).map(([k,v])=>`
        <div class="kat-item">
          <div class="kat-name">${k}</div>
          <div class="kat-amt cyan">${fmt(v)}</div>
        </div>`).join('') || '<div class="stat-sub">Kayıt yok</div>'}
    </div>
  </div>
  ${cls.dusuk_guven_ornekleri.length ? `
  <div class="card" style="margin-bottom:24px">
    <div class="card-title">Düşük Güvenli Örnekler</div>
    ${cls.dusuk_guven_ornekleri.map(r=>`
      <div class="kat-item">
        <div class="kat-name">${r.aciklama}</div>
        <div class="kat-amt">${r.kategori} · ${r.gider_tipi} · ${r.guven.toFixed(2)}</div>
      </div>`).join('')}
  </div>` : ''}

  <!-- Bulanık girdiler -->
  <div class="section-title"><span>🔬</span> Bulanıklaştırma — Üyelik Fonksiyonları</div>
  <div class="grid3">
    ${mfKeys.map(([key,label,cid])=>{
      const mf = d.mf_charts[key];
      const degs = mf.degrees;
      return `<div class="card">
        <div class="card-title">${label} = ${mf.value.toFixed(4)}</div>
        <canvas id="${cid}" height="180"></canvas>
        <div style="margin-top:16px">
          ${Object.entries(degs).map(([k,v])=>`
          <div class="deg-row">
            <div class="deg-label">${k}</div>
            <div class="deg-bar-wrap"><div class="deg-bar" style="width:${Math.round(v*100)}%;background:${degColor(v)}"></div></div>
            <div class="deg-val" style="color:${degColor(v)}">${v.toFixed(3)}</div>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>

  <!-- Kurallar + Çıktı -->
  <div class="section-title"><span>⚙️</span> Mamdani Kuralları & Çıktı</div>
  <div class="grid2">
    <div class="card">
      <div class="card-title">9 Kural — Aktivasyon Kuvvetleri</div>
      ${d.rules.map(r=>`
      <div class="rule-item ${r.active?'active':''}">
        <div class="rule-id">${r.id}</div>
        <div class="rule-cond" style="color:${r.active?'var(--text)':'var(--muted)'}">${r.condition}</div>
        <div class="rule-conc ${concClass[r.conclusion]}">${r.conclusion}</div>
        <div class="rule-act" style="color:${r.active?'var(--cyan)':'var(--muted)'}">${r.activation.toFixed(3)}</div>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Agregasyon & Centroid Durulaştırma</div>
      <canvas id="outChart" height="220"></canvas>
      <div style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap">
        ${Object.entries(d.output_chart.activations).map(([k,v])=>`
        <div style="flex:1;min-width:100px;background:var(--card2);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:.75rem;color:var(--muted)">${k}</div>
          <div style="font-size:1.2rem;font-weight:700;color:${profileColor(k)}">${v.toFixed(4)}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>

  <!-- Portföy + Kategori -->
  <div class="section-title"><span>📈</span> Portföy Dağılımı & Gider Analizi</div>
  <div class="grid2">
    <div class="card">
      <div class="card-title">Önerilen Portföy Dağılımı — ${d.profil}</div>
      <canvas id="portoPie" height="200"></canvas>
      <div style="margin-top:16px">
        ${portoItems.map(([n,p],i)=>`
        <div class="porto-item">
          <div class="porto-dot" style="background:${COLORS[i]}"></div>
          <div class="porto-name">${n}</div>
          <div class="porto-bar-wrap"><div class="porto-bar-fill" style="width:${p}%;background:${COLORS[i]}"></div></div>
          <div class="porto-pct" style="color:${COLORS[i]}">%${p}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Yıllık Gider Dağılımı — Kategori</div>
      <canvas id="katPie" height="200"></canvas>
      <div style="margin-top:16px">
        ${Object.entries(d.banka.kategoriler).map(([k,v],i)=>`
        <div class="kat-item">
          <div class="porto-dot" style="background:${COLORS[i]}"></div>
          <div class="kat-name">${k}</div>
          <div class="kat-amt" style="color:${COLORS[i]}">${fmt(v)} TL</div>
        </div>`).join('')}
      </div>
    </div>
  </div>

  <!-- Aylık trend -->
  <div class="section-title"><span>📅</span> Aylık Gelir / Gider / Tasarruf Trendi</div>
  <div class="card" style="margin-bottom:40px">
    <div class="card-title">Aylık Finansal Tablo</div>
    <canvas id="monthlyChart" height="120"></canvas>
  </div>
  `;

  // Chartları çiz
  mfKeys.forEach(([key,,cid])=>renderMFChart(cid, d.mf_charts[key], d.mf_charts[key].value));
  renderOutputChart('outChart', d.output_chart);
  renderPortoPie('portoPie', porto.items);
  renderKatPie('katPie', d.banka.kategoriler);
  renderMonthly('monthlyChart', d.banka.monthly);
}

loadData().then(render).catch(e=>{
  document.getElementById('app').innerHTML=`<div class="loading"><p style="color:var(--red)">Hata: ${e.message}</p></div>`;
});
</script>
</body>
</html>
